name: CI — Admin Panel

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/admin-panel/**"
      - "packages/shared-types/**"
      - "packages/shared-config/**"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/ci-admin-panel.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/admin-panel/**"
      - "packages/shared-types/**"
      - "packages/shared-config/**"

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared-types
        run: pnpm --filter=@loan-manager/shared-types build

      - name: Lint
        run: pnpm --filter=@loan-manager/admin-panel lint

      - name: Typecheck
        run: pnpm --filter=@loan-manager/admin-panel typecheck

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm --filter=@loan-manager/admin-panel build

      - name: Test
        run: pnpm --filter=@loan-manager/admin-panel test

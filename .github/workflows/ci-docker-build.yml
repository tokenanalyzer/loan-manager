name: CI — Docker Image Builds

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "apps/admin-panel/**"
      - "infra/docker/**"
  workflow_dispatch: {}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: false
          tags: loan-manager/backend:ci

  build-admin-panel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build admin panel image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin-panel/Dockerfile
          push: false
          tags: loan-manager/admin-panel:ci

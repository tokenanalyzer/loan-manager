pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    // Bumped from 7.3.0/1.9.24 (and before that, flutter create's default
    // 1.7.10): the Flutter SDK's own embedded Gradle build script
    // (flutter_tools/gradle, included above) requires a Kotlin/AGP
    // toolchain new enough to compile it — matches the same bump applied
    // to the Customer App's android project for the same reason.
    id "com.android.application" version "9.0.1" apply false
    id "org.jetbrains.kotlin.android" version "2.3.20" apply false
}

include ":app"

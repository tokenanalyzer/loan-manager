name: loan_manager_employee_app
description: Loan Manager — Employee App (Flutter).
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  shared_flutter:
    path: ../../packages/shared-flutter
  go_router: ^14.2.7
  get_it: ^7.7.0

  # Firebase (initialization is guarded/no-op by default — see
  # lib/core/firebase/firebase_bootstrap.dart. Auth/Storage/Messaging
  # usage is not implemented until login/OTP/business features land.)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.2
  firebase_storage: ^12.1.1
  firebase_messaging: ^15.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

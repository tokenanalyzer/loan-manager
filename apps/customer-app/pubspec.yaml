name: loan_manager_customer_app
description: Loan Manager — Customer App (Flutter).
version: 0.2.0+1
publish_to: 'none'

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  shared_flutter:
    path: ../../packages/shared-flutter
  go_router: ^14.2.7
  get_it: ^7.7.0

  # Direct dependency (already transitive via shared_flutter) — used
  # explicitly in document_repository.dart for authenticated byte
  # downloads (document preview), not just relied on incidentally.
  dio: ^5.5.0

  # Phase 6: Riverpod is the reactive UI-state layer for new screens
  # (controllers as StateNotifier/AsyncNotifier). It does not replace
  # GetIt — Riverpod providers wrap the existing GetIt singletons
  # (repositories, AuthController) rather than re-registering them.
  # See lib/core/riverpod/ for the bridge.
  flutter_riverpod: ^2.5.1

  # Onboarding "seen" flag persistence.
  shared_preferences: ^2.2.3

  # Document capture (camera/gallery) for the Documents feature.
  image_picker: ^1.1.2

  # Files/PDF picker for the Documents feature (camera/gallery cover
  # photos; this covers "choose an existing PDF or image from device
  # storage").
  file_picker: ^10.3.3

  # In-app PDF viewer for the Documents feature — pure Dart/FFI
  # (pdfium), MIT license, no license-key registration required
  # (unlike Syncfusion), so a document never has to leave the app or
  # fail to preview just because it's a PDF instead of an image.
  pdfx: ^2.6.0

  # Pinch-to-zoom image viewer for the Documents feature — already a
  # transitive dependency of pdfx; declared directly since it's used
  # explicitly, not just relied on incidentally.
  photo_view: ^0.15.0

  # Contact Support: composes a real mailto: — no fake "ticket sent" screen.
  url_launcher: ^6.3.0

  # Firebase (initialization is guarded/no-op by default — see
  # lib/core/firebase/firebase_bootstrap.dart. Storage/Messaging SDK
  # usage is not implemented yet — Documents uses the backend's own
  # storage endpoint, not the Firebase Storage SDK directly.)
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.2
  firebase_storage: ^12.1.1
  firebase_messaging: ^15.0.2

  # Google Sign-In (federated credential exchanged for a Firebase
  # session via GoogleAuthProvider — see CustomerAuthRepository).
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

# Loan Manager Enterprise — local development stack
# Usage: docker compose -f infra/docker/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: loan-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loanmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-loan_manager_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loanmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    container_name: loan-manager-backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-loanmanager}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-loan_manager_dev}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      # Persists uploaded documents across container restarts/redeploys
      # — without this, LocalDiskStorageService's files would be lost
      # every time the container is recreated. Matches UPLOADS_DIR's
      # default (./uploads, resolved from the Dockerfile's /app WORKDIR).
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  admin-panel:
    build:
      context: ../..
      dockerfile: apps/admin-panel/Dockerfile
    container_name: loan-manager-admin-panel
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:

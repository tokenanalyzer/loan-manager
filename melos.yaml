name: loan_manager_flutter_workspace
repository: https://github.com/tokenanalyzer/loan-manager

packages:
  - apps/customer-app
  - apps/employee-app
  - packages/shared-flutter

command:
  version:
    linkToCommits: true
  bootstrap:
    runPubGetInParallel: true

scripts:
  analyze:
    run: melos exec -- "flutter analyze ."
    description: Run static analysis across all Flutter packages.

  format:
    run: melos exec -- "dart format --set-exit-if-changed ."
    description: Check formatting across all Flutter packages.

  format:fix:
    run: melos exec -- "dart format ."
    description: Apply formatting across all Flutter packages.

  test:
    run: melos exec --dir-exists="test" -- "flutter test"
    description: Run tests in packages that contain a test/ directory.

  clean:
    run: melos exec -- "flutter clean"
    description: Clean build artifacts across all Flutter packages.

  get:
    run: melos exec -- "flutter pub get"
    description: Fetch dependencies across all Flutter packages.

  run:customer:dev:
    run: flutter run --dart-define-from-file=env/development.json
    description: Run the Customer App against local development config.
    packageFilters:
      scope: 'loan_manager_customer_app'

  run:customer:staging:
    run: flutter run --dart-define-from-file=env/staging.json
    description: Run the Customer App against staging config.
    packageFilters:
      scope: 'loan_manager_customer_app'

  run:employee:dev:
    run: flutter run --dart-define-from-file=env/development.json
    description: Run the Employee App against local development config.
    packageFilters:
      scope: 'loan_manager_employee_app'

  run:employee:staging:
    run: flutter run --dart-define-from-file=env/staging.json
    description: Run the Employee App against staging config.
    packageFilters:
      scope: 'loan_manager_employee_app'

  build:customer:apk:
    run: flutter build apk --dart-define-from-file=env/production.json
    description: >-
      Build a release APK for the Customer App. Requires platform folders
      (run `flutter create .` once to generate android/) — see docs/architecture.md.
    packageFilters:
      scope: 'loan_manager_customer_app'

  build:employee:apk:
    run: flutter build apk --dart-define-from-file=env/production.json
    description: >-
      Build a release APK for the Employee App. Requires platform folders
      (run `flutter create .` once to generate android/) — see docs/architecture.md.
    packageFilters:
      scope: 'loan_manager_employee_app'
